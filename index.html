<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Location Viewer</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .info-box {
      line-height: 1.5;
      font-size: 14px;
    }

    .leaflet-popup-content-wrapper {
      background: #1c1c1c;
      color: white;
    }

    .leaflet-popup-tip {
      background: #1c1c1c;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script type="module">
    import {
      createClient
    } from "https://esm.sh/@supabase/supabase-js@2";

    // ====================================
    // YOUR SUPABASE CONFIG
    // ====================================

    const SUPABASE_URL =
      "YOUR_SUPABASE_URL";

    const SUPABASE_ANON_KEY =
      "YOUR_SUPABASE_ANON_KEY";

    const supabase = createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    // ====================================
    // MAP
    // ====================================

    const map = L.map("map").setView(
      [41.3111, 69.2797],
      11
    );

    L.tileLayer(
      "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      {
        attribution:
          "&copy; OpenStreetMap contributors"
      }
    ).addTo(map);

    let markers = [];

    // ====================================
    // FETCH + RENDER
    // ====================================

    async function loadLocations() {
      try {
        // remove old markers

        markers.forEach((m) => map.removeLayer(m));
        markers = [];

        const { data, error } = await supabase
          .from("processed_windows")
          .select(`
            id,
            driver_id,
            window_started_at,
            window_ended_at,
            ping_count,
            avg_accuracy,
            estimated_speed_kmh,
            location
          `)
          .order("window_started_at", {
            ascending: false
          })
          .limit(100);

        if (error) {
          console.error(error);
          return;
        }

        data.forEach((row) => {
          if (!row.location) return;

          const coords =
            row.location.coordinates;

          const lng = coords[0];
          const lat = coords[1];

          // accuracy color

          let color = "red";

          if (row.avg_accuracy <= 20) {
            color = "green";
          } else if (row.avg_accuracy <= 50) {
            color = "yellow";
          }

          const marker = L.circleMarker(
            [lat, lng],
            {
              radius: 8,
              color,
              fillColor: color,
              fillOpacity: 0.8
            }
          ).addTo(map);

          marker.bindPopup(`
            <div class="info-box">
              <b>Driver:</b>
              ${row.driver_id}
              <br />

              <b>Speed:</b>
              ${
                row.estimated_speed_kmh
                  ? row.estimated_speed_kmh.toFixed(1)
                  : 0
              } km/h
              <br />

              <b>Accuracy:</b>
              ${
                row.avg_accuracy
                  ? row.avg_accuracy.toFixed(1)
                  : "N/A"
              } m
              <br />

              <b>Pings:</b>
              ${row.ping_count}
              <br />

              <b>Start:</b>
              <br />
              ${new Date(
                row.window_started_at
              ).toLocaleString()}
              <br /><br />

              <b>End:</b>
              <br />
              ${new Date(
                row.window_ended_at
              ).toLocaleString()}
            </div>
          `);

          markers.push(marker);
        });

      } catch (err) {
        console.error(err);
      }
    }

    // ====================================
    // INITIAL LOAD
    // ====================================

    loadLocations();

    // refresh every 30 seconds

    setInterval(loadLocations, 30000);
  </script>
</body>
</html>
