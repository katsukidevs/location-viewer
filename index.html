<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Location Viewer</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .info-panel {
      position: absolute;
      top: 12px;
      left: 12px;

      z-index: 999;

      background: rgba(0,0,0,0.8);

      padding: 12px;
      border-radius: 10px;

      min-width: 220px;
      backdrop-filter: blur(8px);
    }

    .driver-card {
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    .driver-card:last-child {
      border-bottom: none;
    }

    .small {
      opacity: 0.75;
      font-size: 12px;
    }

    .accuracy-good {
      color: #66ff99;
    }

    .accuracy-mid {
      color: #ffd966;
    }

    .accuracy-bad {
      color: #ff6666;
    }
  </style>
</head>

<body>

  <div id="map"></div>

  <div class="info-panel">
    <h3>Drivers</h3>
    <div id="drivers"></div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
  </script>

  <script type="module">

    import { createClient }
      from "https://esm.sh/@supabase/supabase-js@2";

    // =========================
    // CONFIG
    // =========================

    const SUPABASE_URL =
      "YOUR_SUPABASE_URL";

    const SUPABASE_ANON_KEY =
      "YOUR_SUPABASE_ANON_KEY";

    const supabase =
      createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
      );

    // =========================
    // MAP
    // =========================

    const map = L.map("map").setView(
      [41.3111, 69.2797],
      11
    );

    L.tileLayer(
      "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      {
        attribution:
          "&copy; OpenStreetMap contributors"
      }
    ).addTo(map);

    // =========================
    // STATE
    // =========================

    const markers = {};

    // =========================
    // HELPERS
    // =========================

    function accuracyClass(acc) {
      if (acc == null)
        return "accuracy-mid";

      if (acc <= 20)
        return "accuracy-good";

      if (acc <= 80)
        return "accuracy-mid";

      return "accuracy-bad";
    }

    function formatSpeed(speed) {
      if (speed == null)
        return "N/A";

      return `${speed.toFixed(1)} km/h`;
    }

    function formatAccuracy(acc) {
      if (acc == null)
        return "Unknown";

      return `${Math.round(acc)} m`;
    }

    // =========================
    // FETCH + RENDER
    // =========================

    async function loadLocations() {

      const { data, error } =
        await supabase
          .from("processed_windows")
          .select("*")
          .order(
            "window_ended_at",
            { ascending: false }
          )
          .limit(100);

      if (error) {
        console.error(error);
        return;
      }

      // newest row per driver
      const latestByDriver = {};

      for (const row of data) {
        if (!latestByDriver[row.driver_id]) {
          latestByDriver[row.driver_id] = row;
        }
      }

      const driversDiv =
        document.getElementById("drivers");

      driversDiv.innerHTML = "";

      for (const driverId in latestByDriver) {

        const row =
          latestByDriver[driverId];

        // PostGIS point
        const coords =
          row.location.coordinates;

        const lng = coords[0];
        const lat = coords[1];

        // marker

        if (!markers[driverId]) {

          markers[driverId] =
            L.marker([lat, lng])
              .addTo(map);

        } else {

          markers[driverId]
            .setLatLng([lat, lng]);
        }

        // popup

        markers[driverId]
          .bindPopup(`
            <b>Driver:</b> ${driverId}<br/>
            <b>Speed:</b>
              ${formatSpeed(
                row.estimated_speed_kmh
              )}<br/>
            <b>Accuracy:</b>
              ${formatAccuracy(
                row.avg_accuracy
              )}<br/>
            <b>Pings:</b>
              ${row.ping_count}<br/>
            <b>Updated:</b><br/>
              ${new Date(
                row.window_ended_at
              ).toLocaleString()}
          `);

        // side panel

        const card =
          document.createElement("div");

        card.className = "driver-card";

        card.innerHTML = `
          <div>
            <strong>${driverId}</strong>
          </div>

          <div class="small">
            Speed:
            ${formatSpeed(
              row.estimated_speed_kmh
            )}
          </div>

          <div class="
            small
            ${accuracyClass(
              row.avg_accuracy
            )}
          ">
            Accuracy:
            ${formatAccuracy(
              row.avg_accuracy
            )}
          </div>

          <div class="small">
            Last update:
          </div>

          <div class="small">
            ${new Date(
              row.window_ended_at
            ).toLocaleTimeString()}
          </div>
        `;

        driversDiv.appendChild(card);
      }
    }

    // =========================
    // INIT
    // =========================

    loadLocations();

    setInterval(
      loadLocations,
      30000
    );

  </script>

</body>
</html>
